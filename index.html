    <script>

        // Symbology Value Parsing Color Lookup Map Array
        function getParkColor(typeValue) {
            if (!typeValue) return '#95a5a6';
            switch (typeValue.trim()) {
                case 'CimetiĂ¨re': return '#7f8c8d';
                case 'Espace vert public': return '#2ecc71';

        // Returns url reference id values mapping to the newly injected SVG patterns block code
        function getParkPattern(typeValue) {
            if (!typeValue) return '';

                case 'CimetiĂ¨re': return 'url(#pattern-cemetery)';
                case 'Espace vert public': return 'url(#pattern-green)';

                case 'Jardin d\'Habitants': return 'url(#pattern-jardin)';

        // REVOLUTIONARY FIX: Grabs Leaflet's actual dynamic map canvas root and builds the pattern tags INSIDE it!
        function injectSvgPatterns() {
            var svgCanvas = mymap.getPanes().overlayPane.querySelector('svg');
            if (!svgCanvas) return;

            var defs = svgCanvas.querySelector('defs');
            if (!defs) {
                defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
                svgCanvas.insertBefore(defs, svgCanvas.firstChild);
            }

            defs.innerHTML = `
                <pattern id="pattern-cemetery" width="10" height="10" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
                    <line x1="0" y1="0" x2="0" y2="10" stroke="#7f8c8d" stroke-width="3" />
                </pattern>
                <pattern id="pattern-green" width="12" height="12" patternTransform="rotate(135)" patternUnits="userSpaceOnUse">
                    <line x1="0" y1="0" x2="0" y2="12" stroke="#27ae60" stroke-width="3" />
                </pattern>
                <pattern id="pattern-farm" width="20" height="20" patternUnits="userSpaceOnUse">
                    <line x1="0" y1="0" x2="0" y2="20" stroke="#d35400" stroke-width="4" />
                </pattern>
                <pattern id="pattern-jardin" width="8" height="8" patternTransform="rotate(90)" patternUnits="userSpaceOnUse">
                    <line x1="0" y1="0" x2="0" y2="8" stroke="#2980b9" stroke-width="2" />
                </pattern>
            `;
        }

        var rawBackupGeoJSON = null; // Backup structure holding original dataset parameters safely

        var geojsonLayer = new L.GeoJSON.AJAX('parksLille.geojson', {
            style: function (feature) {
                var typeAttr = feature.properties.types;
                return {

                    fillColor: getParkPattern(typeAttr),
                    weight: 3,
                    opacity: 0.9,
                    fillOpacity: 0.6
                };
            },
            onEachFeature: function (feature, layer) {
                var infoHtml = "<h4>" + (feature.properties.nom || "Espace Vert") + "</h4><hr>";
                if (feature.properties.quartier) infoHtml += "<b>Quartier:</b> " + feature.properties.quartier + "<br>";
                if (feature.properties.types) infoHtml += "<b>Type:</b> " + feature.properties.types + "<br>";
                if (feature.properties["surface"]) infoHtml += "<b>Surface:</b> " + feature.properties["surface"].toFixed(0) + " m²<br>";
                if (feature.properties["Ouverture au public"]) infoHtml += "<b>Ouverture au public:</b> " + feature.properties["Ouverture au public"] + "<br>";

                var popupBtn = $("<button class='btn btn-success btn-xs btn-block' style='margin-top: 10px;'>🔍 Zoomer sur cet espace</button>");
                popupBtn.on('click', function () {
                    if (typeof layer.getBounds === 'function') {
                        mymap.setView(layer.getBounds().getCenter(), 17);
                    }
                });

                var popupContainer = $("<div></div>").append(infoHtml).append(popupBtn);
                layer.bindPopup(popupContainer[0]);

                var typeAttr = (feature.properties.types || "").trim();
                var itemContainer = $("<div class='park-item-entry' data-type='" + typeAttr + "'></div>").append(infoHtml);
                var sidebarBtn = $("<button class='form-control btn-success'>Zoomer sur cet espace</button>");

                sidebarBtn.on('click', function () {
                    if (typeof layer.getBounds === 'function') {
                        mymap.setView(layer.getBounds().getCenter(), 17);
                        layer.openPopup();
                    }
                });

                itemContainer.append(sidebarBtn).append("<hr>");
                $("#park-list-container").append(itemContainer);
            }
        });

        geojsonLayer.addTo(mymap);

        // Inject custom canvas textures immediately upon successful load completion hook
        geojsonLayer.on('data:loaded', function() {
            rawBackupGeoJSON = geojsonLayer.toGeoJSON();
            injectSvgPatterns();
        });

        // Balanced Sync Filter Logic Engine
        $("#park-search").on('input', function () {
            var selectedValue = $(this).val().trim();
            var targetOption = $("#park-types option").filter(function () {
                return $(this).text() === selectedValue;
            });
            var filterKey = targetOption.val() ? targetOption.val().trim() : selectedValue;

            $(".park-item-entry").each(function () {
                var itemType = $(this).attr('data-type');
                if (filterKey === "Toutes les zones vertes" || selectedValue === "") {
                    $(this).show();
                } else if (itemType === filterKey || itemType === selectedValue) {
                    $(this).show();
                } else {
                    $(this).hide();
                }
            });

            if (!rawBackupGeoJSON) return;
            
            geojsonLayer.clearLayers();

            if (filterKey === "Toutes les zones vertes" || selectedValue === "") {
                geojsonLayer.addData(rawBackupGeoJSON);
            } else {
                var filteredFeatures = rawBackupGeoJSON.features.filter(function(feat) {
                    var fType = (feat.properties.types || "").trim();
                    return fType === filterKey || fType === selectedValue;
                });
                var filteredGeoJSONCollection = { type: "FeatureCollection", features: filteredFeatures };
                geojsonLayer.addData(filteredGeoJSONCollection);
            }
            
            // Re-inject definitions layer every time map layers rebuild
            injectSvgPatterns();
        });

        // User-Defined Dynamic Turf.js Spatial Analysis Buffer Routine
        var bufferLayer = null;
        
        $("#btnBuffer").on('click', function () {
            if (bufferLayer) {
                mymap.removeLayer(bufferLayer);
                bufferLayer = null;
            }

            if ($(this).text() === "Générer le Buffer") {
                var distanceVal = parseFloat($("#buffer-input").val());

                if (isNaN(distanceVal) || distanceVal <= 0) {
                    alert("Veuillez entrer une distance de buffer valide (supérieure à 0).");
                    return;
                }

                var originalGeoJSON = geojsonLayer.toGeoJSON();
                if (!originalGeoJSON || !originalGeoJSON.features || originalGeoJSON.features.length === 0) {
                    alert("Les données des parcs ne sont pas encore complètement chargées. Réessayez.");
                    return;
                }

                var bufferedGeoJSON = turf.buffer(originalGeoJSON, distanceVal, { units: 'meters' });

                bufferLayer = L.geoJSON(bufferedGeoJSON, {
                    style: {
                        color: '#2980b9',
                        fillColor: '#3498db',
                        weight: 2,
                        opacity: 0.7,
                        fillOpacity: 0.2
                    }
                }).addTo(mymap);

                mymap.fitBounds(bufferLayer.getBounds());
                $(this).text("Supprimer le Buffer").removeClass("btn-warning").addClass("btn-danger");
            } else {
                $(this).text("Générer le Buffer").removeClass("btn-danger").addClass("btn-warning");
            }
        });
    </script>
</body>

</html>
